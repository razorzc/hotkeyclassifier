name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.+)$') { $matches[1] } else { 'nightly' }
          (Get-Content core/updater.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content core/updater.py
          Write-Host "Version set to: $version"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller PowerLineCV.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerLineCV
          path: dist/PowerLineCV.exe

      - name: Create Release (nightly)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          name: "Nightly Build"
          tag_name: "nightly"
          prerelease: true
          files: dist/PowerLineCV.exe
          make_latest: false
          body: |
            Nightly 构建，基于最新 master 分支。

            **下载** `PowerLineCV.exe` 双击运行即可。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (versioned)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          tag_name: "${{ github.ref_name }}"
          prerelease: false
          files: dist/PowerLineCV.exe
          body: |
            正式版本: ${{ github.ref_name }}

            **下载** `PowerLineCV.exe` 双击运行即可。
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
